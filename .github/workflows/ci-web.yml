name: ci-web

on:
  pull_request:
    paths:
      - 'main/manager-web/**'
      - '.github/workflows/ci-web.yml'
  push:
    branches: [main]
    paths:
      - 'main/manager-web/**'
      - '.github/workflows/ci-web.yml'
  workflow_dispatch:

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: main/manager-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: main/manager-web/package.json

      - name: Install dependencies
        # `--legacy-peer-deps` because element-ui / vue 2 peer deps trip npm 8's strict resolver.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: ESLint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm run test:ci

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: manager-web-dist
          path: main/manager-web/dist
          if-no-files-found: warn
          retention-days: 7
