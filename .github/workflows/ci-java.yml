name: ci-java

on:
  pull_request:
    paths:
      - 'main/manager-api/**'
      - '.github/workflows/ci-java.yml'
  push:
    branches: [main]
    paths:
      - 'main/manager-api/**'
      - '.github/workflows/ci-java.yml'
  workflow_dispatch:

concurrency:
  group: ci-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: main/manager-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Show Maven and Java versions
        run: mvn -v

      - name: Run tests
        run: mvn -B -ntp -DskipITs=false test

      - name: Checkstyle (non-blocking)
        if: always()
        run: mvn -B -ntp checkstyle:check
        continue-on-error: true

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manager-api-surefire-reports
          path: main/manager-api/target/surefire-reports
          if-no-files-found: warn
          retention-days: 14
