name: ci-python

on:
  pull_request:
    paths:
      - 'main/xiaozhi-server/**'
      - '.github/workflows/ci-python.yml'
  push:
    branches: [main]
    paths:
      - 'main/xiaozhi-server/**'
      - '.github/workflows/ci-python.yml'
  workflow_dispatch:

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: main/xiaozhi-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: main/xiaozhi-server/requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint, non-blocking)
        run: ruff check .
        continue-on-error: true

      - name: Pytest
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          pytest -q \
            --cov=config \
            --cov=core \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=pytest-report.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-server-coverage
          path: |
            main/xiaozhi-server/coverage.xml
            main/xiaozhi-server/pytest-report.xml
          if-no-files-found: warn
          retention-days: 14
