    type: anthropic
    base_url: https://api.anthropic.com
    model_name: claude-sonnet-4-5
    api_key: your anthropic api key
    max_tokens: 1024
    temperature: 0.7
  GroqLLM:
    # Groq — https://console.groq.com/ (OpenAI-compatible, very fast inference)
