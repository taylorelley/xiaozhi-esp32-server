TTS:
  # Currently supported types: edge, doubao; you can adapt others
  EdgeTTS:
    # Defines the TTS API type
    type: edge
    # Default is en-US-AriaNeural (neural female US English). Other common English voices:
    #   en-US-JennyNeural, en-US-GuyNeural, en-GB-SoniaNeural, en-AU-NatashaNeural.
    # For Chinese voices use e.g. zh-CN-XiaoxiaoNeural.
    voice: en-US-AriaNeural
    output_dir: tmp/
    # language: "English"  # Output language, e.g. English, Chinese, Japanese, Korean; set according to the language supported by the chosen voice; defaults to Chinese when left blank
  DoubaoTTS:
    # Defines the TTS API type
    type: doubao
    # Volcengine TTS service; create an application in the Volcengine console first and obtain the appid and access_token
    # The Volcengine voice service must be purchased; the starting price is 30 yuan and gives you 100 concurrent requests. The free tier only has 2 concurrent requests and often reports TTS errors
    # After purchasing the service and the free voice, you may need to wait about half an hour before it can be used
    # Activate ordinary voices here: https://console.volcengine.com/speech/service/8
    # Activate the "Wanwan Xiaohe" voice here: https://console.volcengine.com/speech/service/10007; after activation, set `voice` below to zh_female_wanwanxiaohe_moon_bigtts
    api_url: https://openspeech.bytedance.com/api/v1/tts
    voice: BV001_streaming
    output_dir: tmp/
    authorization: "Bearer;"
    appid: your Volcengine TTS service appid
    access_token: your Volcengine TTS service access_token
    cluster: volcano_tts
    speed_ratio: 1.0
    volume_ratio: 1.0
    pitch_ratio: 1.0
    # language: "Chinese"  # Output language, e.g. Chinese, English, Japanese, Korean; set according to the language supported by the chosen voice; defaults to Chinese when left blank
  # Volcengine (Huoshan) TTS, supports bidirectional streaming TTS
  HuoshanDoubleStreamTTS:
    type: huoshan_double_stream
    # Visit https://console.volcengine.com/speech/service/10007 to activate the speech synthesis large model and purchase voices
    # Get the appid and access_token at the bottom of that page
    # Resource ID is fixed at volc.service_type.10029 (large-model TTS and mixing)
    # If using Gizwits, change the endpoint URL to wss://bytedance.gizwitsapi.com/api/v3/tts/bidirection
    # Gizwits does not require filling in appid
    ws_url: wss://openspeech.bytedance.com/api/v3/tts/bidirection
    appid: your Volcengine TTS service appid
    access_token: your Volcengine TTS service access_token
    resource_id: volc.service_type.10029
    speaker: zh_female_wanwanxiaohe_moon_bigtts
    # Enable WebSocket connection reuse; enabled by default (note: when reused, idle connections occupy concurrency slots while the device is in a listening state)
    enable_ws_reuse: True
    # Related parameter documentation: https://www.volcengine.com/docs/6561/1329505
    # Audio output configuration (audio_params) - users can add any audio parameters supported by Volcengine
    audio_params:
      speech_rate: 0  # Speech rate (-50~100)
      loudness_rate: 0  # Volume (-50~100)
      # Multi-emotion voice parameters. Note: only some voices currently support emotion settings.
      # Related voice list: https://www.volcengine.com/docs/6561/1257544
      # emotion: "neutral"  # Emotion type (only some voices support it): neutral, happy, sad, angry, fearful, disgusted, surprised
      # emotion_scale: 4  # Emotion intensity (1~5)
    # Advanced text processing configuration (additions) - users can add any advanced parameters supported by Volcengine
    additions:
      post_process:
        pitch: 0  # Pitch (-12~12)
      # aigc_metadata: {}  # AIGC metadata configuration
      # cache_config: {}  # Cache configuration
    # Mixing control configuration (mix_speaker) - multi-voice blending (TTS 1.0 only)
    # Mixing is primarily for Doubao TTS 1.0 voices; when used, set req_params.speaker to custom_mix_bigtts
    # mix_speaker:
    #   speakers:
    #     - source_speaker: zh_male_bvlazysheep
    #       mix_factor: 0.3
    #     - source_speaker: BV120_streaming
    #       mix_factor: 0.3
    #     - source_speaker: zh_male_ahu_conversation_wvae_bigtts
    #       mix_factor: 0.4
    # language: "Chinese"  # Output language, e.g. Chinese, English, Japanese, Korean; set according to the language supported by the chosen voice; defaults to Chinese when left blank
  CosyVoiceSiliconflow:
    type: siliconflow
    # SiliconFlow TTS
    # Token application page: https://cloud.siliconflow.cn/account/ak
    model: FunAudioLLM/CosyVoice2-0.5B
    voice: FunAudioLLM/CosyVoice2-0.5B:alex
    output_dir: tmp/
    access_token: your SiliconFlow API key
    response_format: wav
    # language: "Chinese"  # Output language, e.g. Chinese, English, Japanese, Korean; set according to the language supported by the chosen voice; defaults to Chinese when left blank
  CozeCnTTS:
    type: cozecn
    # COZECN TTS
    # Token application page: https://www.coze.cn/open/oauth/pats
    voice: 7426720361733046281
    output_dir: tmp/
    access_token: your coze web key
    response_format: wav
    # language: "Chinese"  # Output language, e.g. Chinese, English, Japanese, Korean; set according to the language supported by the chosen voice; defaults to Chinese when left blank
    # The following are optional; the defaults are used if not set
    # speed: 1  # Speech rate: -0.5 to 2
    # loudness_rate: 0  # Volume: -50 to 100
  VolcesAiGatewayTTS:
    type: openai
    # Volcengine - Edge Large-Model Gateway
    # Activate the service first: open the URL below, create a gateway access key, search for and check `Doubao-TTS`, and activate it
    # If you also want to use the LLM provided by the edge large-model gateway, also check `Doubao-pro-32k-functioncall`; see the LLM.VolcesAiGatewayLLM configuration
    # https://console.volcengine.com/vei/aigateway/
    # After activation, get the key here: https://console.volcengine.com/vei/aigateway/tokens-list
    api_key: your gateway access key
    api_url: https://ai-gateway.vei.volces.com/v1/audio/speech
    model: doubao-tts
    # Voice list: https://www.volcengine.com/docs/6561/1257544
    voice: zh_male_shaonianzixin_moon_bigtts
    speed: 1
    output_dir: tmp/
    # language: "Chinese"  # Output language, e.g. Chinese, English, Japanese, Korean; set according to the language supported by the chosen voice; defaults to Chinese when left blank
  FishSpeech:
    # See the tutorial: https://github.com/xinnan-tech/xiaozhi-esp32-server/blob/main/docs/fish-speech-integration.md
    type: fishspeech
    output_dir: tmp/
    response_format: wav
    reference_id: null
    reference_audio: ["config/assets/wakeup_words.wav",]
    reference_text: ["哈啰啊，我是小智啦，声音好听的台湾女孩一枚，超开心认识你耶，最近在忙啥，别忘了给我来点有趣的料哦，我超爱听八卦的啦",]
    normalize: true
    max_new_tokens: 1024
    chunk_length: 200
    top_p: 0.7
    repetition_penalty: 1.2
    temperature: 0.7
    streaming: false
    use_memory_cache: "on"
    seed: null
    channels: 1
    rate: 44100
    api_key: "your api_key"
    api_url: "http://127.0.0.1:8080/v1/tts"
    # language: "Chinese"  # Output language, e.g. Chinese, English, Japanese, Korean; set according to the language supported by the chosen voice; defaults to Chinese when left blank
  GPT_SOVITS_V2:
    # Defines the TTS API type
    # Command to start the TTS service:
    # python api_v2.py -a 127.0.0.1 -p 9880 -c GPT_SoVITS/configs/demo.yaml
    type: gpt_sovits_v2
    url: "http://127.0.0.1:9880/tts"
    output_dir: tmp/
    text_lang: "auto"
    ref_audio_path: "demo.wav"
    prompt_text: ""
    prompt_lang: "zh"
    top_k: 5
    top_p: 1
    temperature: 1
    text_split_method: "cut0"
    batch_size: 1
    batch_threshold: 0.75
    split_bucket: true
    return_fragment: false
    speed_factor: 1.0
    streaming_mode: false
    seed: -1
    parallel_infer: true
    repetition_penalty: 1.35
    aux_ref_audio_paths: []
    # language: "Chinese"  # Output language, e.g. Chinese, English, Japanese, Korean; set according to the language supported by the chosen voice; defaults to Chinese when left blank
  GPT_SOVITS_V3:
    # Defines the TTS API type: GPT-SoVITS-v3lora-20250228
    # Command to start the TTS service:
    # python api.py
    type: gpt_sovits_v3
    url: "http://127.0.0.1:9880"
    output_dir: tmp/
    text_language: "auto"
    refer_wav_path: "caixukun.wav"
