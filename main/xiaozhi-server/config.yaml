    # Free quota: 500000 tokens
    # After activation, get the API key here: https://console.volcengine.com/ark/region:ark+cn-beijing/apiKey?apikey=%7B%7D
    base_url: https://ark.cn-beijing.volces.com/api/v3
    model_name: doubao-1-5-pro-32k-250115
    api_key: your doubao web key
  DeepSeekLLM:
    # Defines the LLM API type
    type: openai
    # You can find your api key here: https://platform.deepseek.com/
    model_name: deepseek-chat
    url: https://api.deepseek.com
    api_key: your deepseek web key
  ChatGLMLLM:
    # Defines the LLM API type
    type: openai
    # glm-4-flash is free, but you still need to register and fill in an api_key
    # You can find your api key here: https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    model_name: glm-4-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: your chat-glm web key
  OllamaLLM:
    # Defines the LLM API type
    type: ollama
    model_name: llama3.2 #  Model name to use; it must be pulled in advance with `ollama pull`
    base_url: http://localhost:11434  # Ollama service address
    # api_key is optional for local Ollama (leave blank). For Ollama Cloud use OllamaCloudLLM below.
  OllamaCloudLLM:
    # Ollama Cloud — https://ollama.com/cloud
    # Uses the same OpenAI-compatible adapter as local Ollama but with a bearer token.
    type: ollama
    # Get your API key at https://ollama.com/settings/keys
    model_name: gpt-oss:120b   # Examples: gpt-oss:120b, qwen3-coder:480b, deepseek-v3.1:671b
    base_url: https://ollama.com/v1
    api_key: your ollama cloud api key
  DifyLLM:
    # Defines the LLM API type
    type: dify
    # A locally deployed Dify endpoint is recommended; some regions in China may have limited access to the Dify public cloud endpoint
    # When using DifyLLM, the `prompt` in this config file has no effect; set the prompt in the Dify console instead
    base_url: https://api.dify.ai/v1
    api_key: your DifyLLM web key
    # Conversation mode; options: workflow `workflows/run`, chat mode `chat-messages`, text generation `completion-messages`
    # When using workflows, the input parameter is `query` and the return parameter should be named `answer`
    # The default input parameter for text generation is also `query`
    mode: chat-messages
  GeminiLLM:
    type: gemini
    # Google Gemini API; create an API key in the Google Cloud Console first and obtain the api_key
    # If used inside mainland China, please comply with the "Interim Measures for the Management of Generative AI Services"
    # Token application page: https://aistudio.google.com/apikey
    # If your deployment location cannot access the endpoint, you need to enable a VPN
    api_key: your gemini web key
    model_name: "gemini-2.0-flash"
    http_proxy: ""  #"http://127.0.0.1:10808"
    https_proxy: "" #http://127.0.0.1:10808"
  CozeLLM:
    # Defines the LLM API type
    type: coze
    # You can find your personal access token here
    # https://www.coze.cn/open/oauth/pats
    # The bot_id and user_id values should be wrapped in quotes
    bot_id: "your bot_id"
    user_id: "your user_id"
    personal_access_token: your coze personal access token
  VolcesAiGatewayLLM:
    # Volcengine - Edge Large-Model Gateway
    # Defines the LLM API type
    type: openai
    # Activate the service first: open the URL below, create a gateway access key, search for and check `Doubao-pro-32k-functioncall`, and activate it
    # If you also want to use the speech synthesis provided by the edge large-model gateway, also check `Doubao-TTS`; see the TTS.VolcesAiGatewayTTS configuration
    # https://console.volcengine.com/vei/aigateway/
    # After activation, get the key here: https://console.volcengine.com/vei/aigateway/tokens-list
    base_url: https://ai-gateway.vei.volces.com/v1
    model_name: doubao-pro-32k-functioncall
    api_key: your gateway access key
  LMStudioLLM:
    # Defines the LLM API type
    type: openai
    model_name: deepseek-r1-distill-llama-8b@q4_k_m # Model name to use; must be downloaded from the community in advance
    url: http://localhost:1234/v1 # LM Studio service address
    api_key: lm-studio # Fixed API key for the LM Studio service
  HomeAssistant:
    # Defines the LLM API type
    type: homeassistant
    base_url: http://homeassistant.local:8123
    agent_id: conversation.chatgpt
    api_key: your Home Assistant API access token
  FastgptLLM:
    # Defines the LLM API type
    type: fastgpt
    # When using fastgpt, the `prompt` in this config file has no effect; set the prompt in the fastgpt console instead
    base_url: https://host/api/v1
    # You can find your api_key here
    # https://cloud.tryfastgpt.ai/account/apikey
    api_key: your fastgpt key
    variables:
      k: "v"
      k2: "v2"
  XinferenceLLM:
    # Defines the LLM API type
    type: xinference
    # Xinference service address and model name
    model_name: qwen2.5:72b-AWQ  # Model name to use; the corresponding model must be started in Xinference in advance
    base_url: http://localhost:9997  # Xinference service address
  XinferenceSmallLLM:
    # Defines a lightweight LLM API type, used for intent recognition
    type: xinference
    # Xinference service address and model name
    model_name: qwen2.5:3b-AWQ  # Small-model name to use, for intent recognition
    base_url: http://localhost:9997  # Xinference service address
  OpenAILLM:
    # OpenAI ChatGPT — https://platform.openai.com/
    type: openai
    base_url: https://api.openai.com/v1
    model_name: gpt-4o-mini
    api_key: your openai api key
    temperature: 0.7
    max_tokens: 500
  AnthropicLLM:
    # Anthropic Claude — https://console.anthropic.com/
