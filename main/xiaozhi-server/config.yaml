    base_url: https://api.groq.com/openai/v1
    model_name: llama-3.3-70b-versatile
    api_key: your groq api key
    temperature: 0.7
    max_tokens: 500
  OpenRouterLLM:
    # OpenRouter — https://openrouter.ai/ (OpenAI-compatible aggregator for 100+ models)
