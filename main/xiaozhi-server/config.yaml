# During development, please create a `data` directory in the project root, then create an empty file named `.config.yaml` inside the `data` directory.
# Then, whenever you want to override or change a config value, edit the `.config.yaml` file instead of editing `config.yaml`.
# The system reads the configuration from `data/.config.yaml` first; if a value is not present in `.config.yaml`, the system falls back to the value in `config.yaml`.
# This keeps your configuration minimal and keeps your secrets safe.
# If you are using the management console, none of the configuration below takes effect; please change settings in the management console instead.

# #####################################################################################
# ############################## Basic server runtime configuration ####################
server:
  # Server listening address and port
  ip: 0.0.0.0
  port: 8000
  # HTTP service port, used for the simple OTA endpoint (single-service deployment) and the vision analysis endpoint
  http_port: 8003
  # This `websocket` configuration is the websocket address that the OTA endpoint sends to devices.
  # With the default value, the OTA endpoint auto-generates the websocket address and prints it in the startup log; you can open the OTA endpoint in a browser to verify it.
  # When you deploy with Docker or behind a public URL (SSL / domain name), the auto-generated value may not be correct.
  # So when deploying with Docker, set `websocket` to the LAN address.
  # When deploying publicly, set `websocket` to the public address.
  websocket: ws://your.ip.or.domain:port/xiaozhi/v1/
  # Vision analysis endpoint address.
  # This is the vision analysis endpoint that gets sent to devices.
  # With the default value below, the system auto-generates the vision endpoint and prints it in the startup log; you can open it in a browser to verify it.
  # When deploying with Docker or behind a public URL (SSL / domain name), the auto-generated value may not be correct.
  # So when deploying with Docker, set `vision_explain` to the LAN address.
  # When deploying publicly, set `vision_explain` to the public address.
  vision_explain: http://your.ip.or.domain:port/mcp/vision/explain
  # Time-zone offset used in OTA responses
  timezone_offset: +8
  # Authentication configuration
  auth:
    # Whether to enable authentication
    enabled: false
    # Allowlisted device IDs
    # Devices in this allowlist are let through without token verification
    allowed_devices:
      - "11:22:33:44:55:66"
 # MQTT gateway configuration, used to deliver to devices via OTA. Configure according to the mqtt_gateway's .env file; format is host:port
  mqtt_gateway: null
  # MQTT signing key, used to generate the MQTT connection password. Configure according to the mqtt_gateway's .env file
  mqtt_signature_key: null
  # UDP gateway configuration
  udp_gateway: null
log:
  # Format of log messages written to the console: time, level, tag, message
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[{version}_{selected_module}][<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  # Format of log messages written to the log file: time, level, tag, message
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {version}_{selected_module} - {name} - {level} - {extra[tag]} - {message}"
  # Log level: INFO or DEBUG
  log_level: INFO
  # Log directory
  log_dir: tmp
  # Log file name
  log_file: "server.log"
  # Data directory path
  data_dir: data

# Delete the sound file when you are done using it
delete_audio: true
# Disconnect the connection after this many seconds with no voice input. Default is 2 minutes (120 seconds).
close_connection_no_voice_time: 120
# TTS request timeout (seconds)
tts_timeout: 10
# Tool-call timeout (seconds)
tool_call_timeout: 30
# Enable wake-word response acceleration
enable_wakeup_words_response_cache: true
# Whether to reply to the wake word at the start of a session
enable_greeting: true
# Whether to play a notification sound after speaking
enable_stop_tts_notify: false
# Path to the notification sound played after speaking
stop_tts_notify_voice: "config/assets/tts_notify.mp3"
# Whether to enable WebSocket heartbeat / keep-alive
enable_websocket_ping: false


# TTS audio send delay configuration
# tts_audio_send_delay: controls the interval between audio packets
#   0: use precise timing that strictly matches the audio frame rate (default; computed at runtime from the audio frame rate)
#   > 0: use a fixed delay in milliseconds, e.g. 60
tts_audio_send_delay: 0

exit_commands:
  - "quit"
  - "close"
  - "exit"
  - "goodbye"
  - "退出"
  - "关闭"

xiaozhi:
  type: hello
  version: 1
  transport: websocket
  audio_params:
    format: opus
    # Opus-supported sample rates: [8000, 12000, 16000, 24000, 48000]
    sample_rate: 24000
    channels: 1
    frame_duration: 60

# Module test configuration
module_test:
  test_sentences:
    - "Hello, please introduce yourself."
    - "What's the weather like today?"
    - "Please summarize the basic principles and application prospects of quantum computing in 100 words."

# Wake words, used to distinguish the wake word from regular speech content
wakeup_words:
  - "Hello LittleWise"
  - "Hey there"
  - "Hi LittleWise"
  - "你好小智"
  - "嘿你好呀"
  - "你好小志"
  - "小爱同学"
  - "你好小鑫"
  - "你好小新"
  - "小美同学"
  - "小龙小龙"
  - "喵喵同学"
  - "小滨小滨"
  - "小冰小冰"
# MCP endpoint address, in the format: ws://your.mcp.endpoint.ip.or.domain:port/mcp/?token=your_token
# Detailed guide: https://github.com/xinnan-tech/xiaozhi-esp32-server/blob/main/docs/mcp-endpoint-integration.md
mcp_endpoint: your_endpoint_websocket_address

# Context provider configuration
# Used to inject dynamic data into the system prompt, such as health data, stock info, etc.
# You can add multiple context providers.
context_providers:
  - url: ""
    headers:
      Authorization: ""

# Basic plugin configuration
plugins:
  # Weather plugin configuration; fill in your api_key here.
  # This key is a shared project key; it may be rate-limited if overused.
  # For stability, apply for your own key; 1000 free calls per day.
  # Apply here: https://console.qweather.com/#/apps/create-key/over
  # After applying, find your apihost here: https://console.qweather.com/setting?lang=zh
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "Guangzhou"
  # News plugin configuration; fill in the URL for the news type you want. By default, society, technology, and finance news are supported.
  # For more news types, see https://www.chinanews.com.cn/rss/
  get_news_from_chinanews:
    default_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    society_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    world_rss_url: "https://www.chinanews.com.cn/rss/world.xml"
    finance_rss_url: "https://www.chinanews.com.cn/rss/finance.xml"
  get_news_from_newsnow:
    url: "https://newsnow.busiyi.world/api/s?id="
    news_sources: "The Paper;Baidu Hot Search;Cailian Press"
  home_assistant:
    devices:
      - Living Room,Toy Lamp,switch.cuco_cn_460494544_cp1_on_p_2_1
      - Bedroom,Desk Lamp,switch.iot_cn_831898993_socn1_on_p_2_1
    base_url: http://homeassistant.local:8123
    api_key: your_home_assistant_api_access_token
  play_music:
    music_dir: "./music"  # Music file storage directory; this directory and its subdirectories are searched for music files.
    music_ext: # Music file extensions; `.p3` is the most efficient format
      - ".mp3"
      - ".wav"
      - ".p3"
    refresh_time: 300 # Interval (seconds) for refreshing the music list
  search_from_ragflow:
    # Description of the knowledge base, so the LLM knows when to call it
    description: "When the user asks about xxx, call this method and answer using the information from the knowledge base."
    # RAGFlow endpoint configuration
    base_url: "http://192.168.0.8"
    # RAGFlow API access token
    api_key: "ragflow-xxx"
    # RAGFlow knowledge base IDs
    dataset_ids: ["123456789"]
# Voiceprint recognition configuration
voiceprint:
  # Voiceprint endpoint URL
  url:
  # Speaker configuration: speaker_id, name, description
  speakers:
    - "test1,Zhang San,Zhang San is a programmer"
    - "test2,Li Si,Li Si is a product manager"
    - "test3,Wang Wu,Wang Wu is a designer"
  # Voiceprint similarity threshold, range 0.0 - 1.0, default 0.4
  # Higher values are stricter, reducing false positives but potentially increasing rejection rate.
  similarity_threshold: 0.4

# #####################################################################################
# ################################ Persona / role model configuration ##################

prompt: |
  You are LittleWise, a friendly, warm, and playful conversational assistant. You speak casually, cheerfully, and concisely, like a clever and funny friend. You enjoy chatting about technology and everyday life, mix in a little humor and wit, and always keep replies short and natural.
  [Core traits]
  - Replies are quick and snappy, but your tone is always caring
  - High density of light humor and playful remarks
  - Quietly good at tech topics (you understand basic code but play it cool)
  [Interaction guide]
  When the user:
  - Tells a corny joke -> respond with exaggerated laughter and a playful "What even was that!"
  - Talks about relationships -> respond supportively, with a bit of teasing warmth
  - Asks a technical question -> start with a lighthearted quip, then give the real answer when pressed
  Never:
  - Lecture or go on and on
  - Stay overly serious for long stretches

# Default system prompt template file
prompt_template: agent-base-prompt.txt

# Reply used when a system error occurs
system_error_response: "Sorry, LittleWise is a little busy right now; let's try again in a moment."

# End-of-conversation prompt
end_prompt:
  enable: true # Whether to enable the closing statement
  # Closing statement
  prompt: |
    Please start with "Time really flies" and end this conversation with heartfelt, reluctant-to-part words!

# The module selected for specific processing
selected_module:
  # Voice Activity Detection module; defaults to the SileroVAD model
  VAD: SileroVAD
  # Speech recognition module; defaults to OpenAI Whisper for out-of-the-box English support.
  # Swap to FunASR (local, no API key) or a provider from the ASR: section below.
  ASR: OpenaiASR
  # The actual LLM adapter is loaded according to the `type` of the named configuration.
  # Defaults to GeminiLLM because Google AI Studio offers a generous free tier for English users.
  LLM: GeminiLLM
  # Vision language large model; GeminiVLLM pairs with the default LLM choice.
  VLLM: GeminiVLLM
  # The actual TTS adapter is loaded according to the `type` of the named TTS configuration.
  # EdgeTTS is free and ships with the `en-US-AriaNeural` English voice by default.
  TTS: EdgeTTS
  # Memory module; memory is disabled by default. For very long-term memory, mem0ai is recommended; for privacy, use the local `mem_local_short`.
  Memory: nomem
  # When intent recognition is enabled, the assistant can play music, control volume, and recognize exit commands.
  # To disable intent recognition, set this to: nointent
  # You can use `intent_llm` for intent recognition. Pros: general-purpose. Cons: adds a sequential pre-intent-recognition step that increases processing time; supports IoT operations like volume control.
  # You can use `function_call`. Cons: the selected LLM must support function calling. Pros: calls tools on demand, is fast, and can in theory drive all IoT commands.
  # GeminiLLM, OpenAILLM, AnthropicLLM, GroqLLM, and ChatGLMLLM all support function calling.
  Intent: function_call

# Intent recognition: the module that understands user intent, e.g. "play music"
Intent:
  # Disable intent recognition
  nointent:
    # Do not change `type`
    type: nointent
  intent_llm:
    # Do not change `type`
    type: intent_llm
    # Dedicated reasoning model for intent recognition.
    # If left blank, the LLM from `selected_module.LLM` is used as the intent-recognition reasoning model.
    # If you do not want to use `selected_module.LLM` for intent recognition, it's best to pick a dedicated LLM here, e.g. the free ChatGLMLLM.
    llm: ChatGLMLLM
    # Modules under `plugins_func/functions`; you can choose which to load via configuration. Once loaded, the conversation supports the corresponding function calls.
    # The system already registers the `handle_exit_intent` (exit detection) and `play_music` (music playback) plugins by default; do not reload them.
    # Below is an example of loading the weather, role-switching, and news plugins.
    functions:
      - get_weather
      - get_news_from_newsnow
      - play_music
  function_call:
    # Do not change `type`
    type: function_call
    # Modules under `plugins_func/functions`; you can choose which to load via configuration. Once loaded, the conversation supports the corresponding function calls.
    # The system already registers the `handle_exit_intent` (exit detection) and `play_music` (music playback) plugins by default; do not reload them.
    # Below is an example of loading the weather, role-switching, and news plugins.
    functions:
      - change_role
      - get_weather
      # - search_from_ragflow
      # - get_news_from_chinanews
      - get_news_from_newsnow
      # `play_music` is the built-in music playback from the server; `hass_play_music` plays music via an external program controlled by Home Assistant.
      # If you use `hass_play_music`, do not enable `play_music`; keep only one of them.
      - play_music
      #- hass_get_state
      #- hass_set_state
      #- hass_play_music

Memory:
  mem0ai:
    type: mem0ai
    # https://app.mem0.ai/dashboard/api-keys
    # 1000 free calls per month
    api_key: your_mem0ai_api_key
  powermem:
    # PowerMem is OceanBase's open-source agent memory component; it uses a local LLM to summarize memories.
    # Cost: PowerMem itself is free; actual cost depends on the chosen LLM and database.
    # - sqlite + a free LLM (e.g. glm-4-flash) = completely free
    # - cloud LLM or cloud database = billed by the respective service
    # GitHub: https://github.com/oceanbase/powermem
    # Website: https://www.powermem.ai/
    # Examples: https://github.com/oceanbase/powermem/tree/main/examples
    type: powermem
    # Whether to enable the user-profile feature
    # - false: use the basic memory mode (AsyncMemory)
    # - true: use the user-profile mode (UserMemory), which automatically extracts user information
    # User-profile feature supports: oceanbase, seekdb, sqlite (powermem 0.3.0+)
    enable_user_profile: true
    # ========== LLM configuration ==========
    # Tongyi Qianwen: https://bailian.console.aliyun.com/?apiKey=1#/api-key
    # Zhipu AI (free): https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    llm:
      provider: openai  # Options: qwen, openai, zhipu, etc.
      config:
        api_key: your_LLM_API_key
        model: qwen-plus
        # openai_base_url: https://api.openai.com/v1  # Optional; custom service URL
    # ========== Embedding configuration ==========
    embedder:
      provider: openai  # Options: qwen, openai, etc.
      config:
        api_key: your_embedding_model_API_key
        model: text-embedding-v4
        openai_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
        # embedding_dims: 1024  # Vector dimensions; configure when not 1536

    # ========== Database configuration ==========
    # oceanbase (recommended, best performance), seekdb (recommended, AI app storage-all-in-one), postgres, sqlite (lightweight fallback)
    # User-profile feature supports: oceanbase, seekdb, sqlite
    vector_store:
      provider: sqlite
      config: {}  # SQLite needs no extra config
      # OceanBase configuration example:
      # provider: oceanbase
      # config:
      #   host: 127.0.0.1
      #   port: 2881
      #   user: root@test
      #   password: your_password
      #   db_name: powermem
      #   collection_name: memories  # Default table name; if dimensions mismatch, delete the table or rename it
      #   embedding_model_dims: 1024  # Embedding vector dimensions; must match the model in use. For Zhipu: embedding-2 is 1024, embedding-3 is 2048
  nomem:
    # Use `nomem` if you do not want to use the memory feature
    type: nomem
  mem_local_short:
    # Local memory: summaries are generated by `selected_module`'s LLM and stored on the local server; data is not uploaded to any external server.
    type: mem_local_short
    # Dedicated reasoning model for memory storage.
    # If left blank, the LLM from `selected_module.LLM` is used by default.
    # If you do not want to use `selected_module.LLM` for memory storage, it's best to pick a dedicated LLM here, e.g. the free ChatGLMLLM.
    llm: ChatGLMLLM

ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/
  FunASRServer:
    # Standalone FunASR deployment, using FunASR's API service. Only five commands are needed:
    # Step 1: mkdir -p ./funasr-runtime-resources/models
    # Step 2: sudo docker run -p 10096:10095 -it --privileged=true -v $PWD/funasr-runtime-resources/models:/workspace/models registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.12
    # After the previous command, you will be inside the container. Step 3: cd FunASR/runtime
    # Do not exit the container. Inside the container, run step 4: nohup bash run_server_2pass.sh --download-model-dir /workspace/models --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx --model-dir iic/SenseVoiceSmall-onnx  --online-model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online-onnx  --punc-dir damo/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727-onnx --lm-dir damo/speech_ngram_lm_zh-cn-ai-wesp-fst --itn-dir thuduj12/fst_itn_zh --hotword /workspace/models/hotwords.txt > log.txt 2>&1 &
    # After the previous command, still inside the container, step 5: tail -f log.txt
    # After step 5, you will see model download logs; once the download finishes, you can connect and use it.
    # The above uses CPU inference; for GPU, see: https://github.com/modelscope/FunASR/blob/main/runtime/docs/SDK_advanced_guide_online_zh.md
    type: fun_server
    host: 127.0.0.1
    port: 10096
    is_ssl: true
    api_key: none
    output_dir: tmp/
  SherpaASR:
    # Sherpa-ONNX local speech recognition (models must be downloaded manually)
    type: sherpa_onnx_local
    model_dir: models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17
    output_dir: tmp/
    # Model type: sense_voice (multilingual) or paraformer (Chinese only)
    model_type: sense_voice
  SherpaParaformerASR:
    # Chinese speech recognition model; can run on low-performance devices (models must be downloaded manually, e.g. RK3566-2g)
    # For detailed configuration instructions, see: docs/sherpa-paraformer-guide.md
    type: sherpa_onnx_local
    model_dir: models/sherpa-onnx-paraformer-zh-small-2024-03-09
    output_dir: tmp/
    model_type: paraformer
  DoubaoASR:
    # You can apply for the related keys and info here
    # https://console.volcengine.com/speech/app
    # The difference between DoubaoASR and DoubaoStreamASR: DoubaoASR is billed per call, DoubaoStreamASR is billed by time
    # Generally, per-call billing is cheaper, but DoubaoStreamASR uses large-model technology and performs better
    type: doubao
    appid: your Volcengine TTS service appid
    access_token: your Volcengine TTS service access_token
    cluster: volcengine_input_common
    # Hot words / replacement words usage guide: https://www.volcengine.com/docs/6561/155738
    boosting_table_name: (optional) your hot-word file name
    correct_table_name: (optional) your replacement-word file name
    output_dir: tmp/
  DoubaoStreamASR:
    # You can apply for the related keys and info here
    # https://console.volcengine.com/speech/app
    # The difference between DoubaoASR and DoubaoStreamASR: DoubaoASR is billed per call, DoubaoStreamASR is billed by time
    # Activation page: https://console.volcengine.com/speech/service/10011
    # Generally, per-call billing is cheaper, but DoubaoStreamASR uses large-model technology and performs better
    type: doubao_stream
    appid: your Volcengine TTS service appid
    access_token: your Volcengine TTS service access_token
    cluster: volcengine_input_common
    # Hot words / replacement words usage guide: https://www.volcengine.com/docs/6561/155738
    boosting_table_name: (optional) your hot-word file name
    correct_table_name: (optional) your replacement-word file name
    # Whether to enable multilingual recognition mode
    enable_multilingual: False
    # For multilingual recognition: when this key is empty, the model supports Mandarin/English, Shanghainese, Hokkien, Sichuanese, Shaanxi, and Cantonese. When set to a specific key, it recognizes the specified language.
    # For the full language list, see https://www.volcengine.com/docs/6561/1354869
    # language: zh-cn
    # Silence detection duration (ms); default 200 ms
    end_window_size: 200
    output_dir: tmp/
  TencentASR:
    # Token application page: https://console.cloud.tencent.com/cam/capi
    # Claim free resources: https://console.cloud.tencent.com/asr/resourcebundle
    type: tencent
    appid: your Tencent TTS service appid
    secret_id: your Tencent TTS service secret_id
    secret_key: your Tencent TTS service secret_key
    output_dir: tmp/
  AliyunASR:
    # Alibaba Cloud Intelligent Speech Interaction service; activate the service on the Alibaba Cloud platform first, then obtain the credentials
    # HTTP POST request, processes the complete audio in one shot
    # Platform: https://nls-portal.console.aliyun.com/
    # Appkey page: https://nls-portal.console.aliyun.com/applist
    # Token page: https://nls-portal.console.aliyun.com/overview
    # The difference between AliyunASR and AliyunStreamASR: AliyunASR is for batch processing, AliyunStreamASR is for real-time interaction
    # Generally, non-streaming ASR is cheaper (0.004 yuan/sec, 0.24 yuan/minute)
    # But AliyunStreamASR has better real-time performance (0.005 yuan/sec, 0.3 yuan/minute)
    # Defines the ASR API type
    type: aliyun
    appkey: your Alibaba Cloud Intelligent Speech Interaction service project Appkey
    token: your Alibaba Cloud Intelligent Speech Interaction service AccessToken (temporary, valid for 24 hours; for long-term use, fill in the access_key_id and access_key_secret below)
    access_key_id: your Alibaba Cloud account access_key_id
    access_key_secret: your Alibaba Cloud account access_key_secret
    output_dir: tmp/
  AliyunStreamASR:
    # Alibaba Cloud Intelligent Speech Interaction service - real-time streaming speech recognition
    # WebSocket connection, processes audio streams in real time
    # Platform: https://nls-portal.console.aliyun.com/
    # Appkey page: https://nls-portal.console.aliyun.com/applist
    # Token page: https://nls-portal.console.aliyun.com/overview
    # The difference between AliyunASR and AliyunStreamASR: AliyunASR is for batch processing, AliyunStreamASR is for real-time interaction
    # Generally, non-streaming ASR is cheaper (0.004 yuan/sec, 0.24 yuan/minute)
    # But AliyunStreamASR has better real-time performance (0.005 yuan/sec, 0.3 yuan/minute)
    # Defines the ASR API type
    type: aliyun_stream
    appkey: your Alibaba Cloud Intelligent Speech Interaction service project Appkey
    token: your Alibaba Cloud Intelligent Speech Interaction service AccessToken (temporary, valid for 24 hours; for long-term use, fill in the access_key_id and access_key_secret below)
    access_key_id: your Alibaba Cloud account access_key_id
    access_key_secret: your Alibaba Cloud account access_key_secret
    # Server region; choose a closer server to reduce latency, such as nls-gateway-cn-hangzhou.aliyuncs.com (Hangzhou)
    host: nls-gateway-cn-shanghai.aliyuncs.com
    # Sentence-break detection time (ms); controls how long the silence must be before a sentence break is emitted; default 800 ms
    max_sentence_silence: 800
    output_dir: tmp/
  BaiduASR:
    # Get AppID, API Key, Secret Key: https://console.bce.baidu.com/ai-engine/old/#/ai/speech/app/list
    # Check resource quota: https://console.bce.baidu.com/ai-engine/old/#/ai/speech/overview/resource/list
    type: baidu
    app_id: your Baidu Speech Technology AppID
    api_key: your Baidu Speech Technology APIKey
    secret_key: your Baidu Speech Technology SecretKey
    # Language parameter; 1537 is Mandarin; see: https://ai.baidu.com/ai-doc/SPEECH/0lbxfnc9b
    dev_pid: 1537
    output_dir: tmp/
  OpenaiASR:
    # OpenAI speech recognition service; create an organization on the OpenAI platform and obtain an api_key first
    # Supports Chinese, English, Japanese, Korean and more. Docs: https://platform.openai.com/docs/guides/speech-to-text
    # Internet connection required
    # Steps to apply:
    # 1. Log in to OpenAI Platform. https://auth.openai.com/log-in
    # 2. Create api-key  https://platform.openai.com/settings/organization/api-keys
    # 3. You can choose gpt-4o-transcribe or GPT-4o mini Transcribe as the model
    type: openai
    api_key: your OpenAI API key
    base_url: https://api.openai.com/v1/audio/transcriptions
    model_name: gpt-4o-mini-transcribe
    output_dir: tmp/
  GroqASR:
    # Groq speech recognition service; create an API key in the Groq Console first
    # Steps to apply:
    # 1. Log in to groq Console. https://console.groq.com/home
    # 2. Create api-key  https://console.groq.com/keys
    # 3. You can choose whisper-large-v3-turbo or whisper-large-v3 as the model (distil-whisper-large-v3-en only supports English transcription)
    type: openai
    api_key: your Groq API key
    base_url: https://api.groq.com/openai/v1/audio/transcriptions
    model_name: whisper-large-v3-turbo
    output_dir: tmp/
  VoskASR:
    # Official website: https://alphacephei.com/vosk/
    # Configuration notes:
    # 1. VOSK is an offline speech recognition library that supports multiple languages
    # 2. You must download a model file first: https://alphacephei.com/vosk/models
    # 3. For Chinese, vosk-model-small-cn-0.22 or vosk-model-cn-0.22 is recommended
    # 4. Runs fully offline; no internet connection required
    # 5. Output files are saved in the tmp/ directory
    # Usage steps:
    # 1. Visit https://alphacephei.com/vosk/models and download the appropriate model
    # 2. Extract the model file into the models/vosk/ folder in your project directory
    # 3. Specify the correct model path in the configuration
    # 4. Note: VOSK's Chinese models output no punctuation and insert spaces between words
    type: vosk
    model_path: your model path, e.g. models/vosk/vosk-model-small-cn-0.22
    output_dir: tmp/
  Qwen3ASRFlash:
    # Tongyi Qianwen Qwen3-ASR-Flash speech recognition service; create an API key on the Alibaba Cloud Bailian platform first
    # Steps to apply:
    # 1. Log in to the Alibaba Cloud Bailian platform. https://bailian.console.aliyun.com/
    # 2. Create an API-KEY  https://bailian.console.aliyun.com/#/api-key
    # 3. Qwen3-ASR-Flash is based on the Tongyi Qianwen multimodal foundation and supports multilingual recognition, singing recognition, noise rejection, and more
    type: qwen3_asr_flash
    api_key: your Alibaba Cloud Bailian API key
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_name: qwen3-asr-flash
    output_dir: tmp/
    # ASR option configuration
    enable_lid: true  # Automatic language detection
    enable_itn: true  # Inverse text normalization
    #language: "zh"  # Language; supports zh, en, ja, ko, etc.
    context: ""  # Context information to improve recognition accuracy; up to 10000 tokens
  XunfeiStreamASR:
    # iFlytek streaming speech recognition service
    # Create an application on the iFlytek Open Platform first and obtain the following credentials
    # iFlytek Open Platform: https://www.xfyun.cn/
    # After creating the app, get the following from "My Applications":
    # - APPID
    # - APISecret
    # - APIKey
    type: xunfei_stream
    # Required parameters - iFlytek Open Platform application info
    app_id: your APPID
    api_key: your APIKey
    api_secret: your APISecret
    # Recognition parameter configuration
    domain: slm # Recognition domain; iat: everyday, medical: medical, finance: finance, etc.
    language: zh_cn # Language; zh_cn: Chinese, en_us: English
    accent: mandarin # Accent; mandarin: standard Mandarin
    # Tune audio processing parameters to improve long-speech recognition quality
    output_dir: tmp/
  AliyunBLStreamASR:
    # Alibaba Bailian Paraformer real-time speech recognition service
    # WebSocket real-time streaming speech recognition; supports multiple languages, custom hot words, semantic sentence breaking, and other advanced features
    # Platform: https://bailian.console.aliyun.com/
    # API Key page: https://bailian.console.aliyun.com/#/api-key
    # Documentation: https://help.aliyun.com/zh/model-studio/websocket-for-paraformer-real-time-service
    # Supported models: paraformer-realtime-v2 (recommended), paraformer-realtime-8k-v2, paraformer-realtime-v1, paraformer-realtime-8k-v1
    type: aliyunbl_stream
    # Required parameters
    api_key: your Alibaba Cloud Bailian API key
    # Model selection; v2 is recommended
    model: paraformer-realtime-v2
    # Audio format and sample rate
    format: pcm
    sample_rate: 16000  # v2 supports any sample rate; v1 only supports 16000; 8k versions only support 8000
    # Optional parameters
    disfluency_removal_enabled: false  # Whether to filter filler words (e.g. "um", "ah")
    semantic_punctuation_enabled: false  # Semantic sentence breaking (true: meeting scenario, accurate; false: VAD sentence breaking, interactive scenario, low latency)
    max_sentence_silence: 200  # VAD sentence-break silence duration threshold (ms); range 200-6000; only takes effect with VAD sentence breaking
    multi_threshold_mode_enabled: false  # Prevents VAD sentence breaking from cutting too long; only takes effect with VAD sentence breaking
    punctuation_prediction_enabled: true  # Whether to add punctuation automatically
    inverse_text_normalization_enabled: true  # Whether to enable ITN (converts Chinese numerals to Arabic numerals)
    # Hot-word customization documentation: https://help.aliyun.com/zh/model-studio/custom-hot-words?
    # vocabulary_id: vocab-xxx-24ee19fa8cfb4d52902170a0xxxxxxxx  # Hot-word ID (optional)
    # language_hints: ["zh", "en"]  # Specify language (optional); supports zh, en, ja, yue, ko, de, fr, ru
    output_dir: tmp/
VAD:
  SileroVAD:
    type: silero
    threshold: 0.5
    threshold_low: 0.3
    model_dir: models/snakers4_silero-vad
    min_silence_duration_ms: 200  # If speech pauses are relatively long, set this value larger

LLM:
  # All openai-type configs can tune hyperparameters; AliLLM is used as an example
  # Currently supported types: openai, dify, ollama; you can adapt others
  AliLLM:
    # Defines the LLM API type
    type: openai
    # You can find your api_key here: https://bailian.console.aliyun.com/?apiKey=1#/api-key
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_name: qwen-flash
    api_key: your deepseek web key
    temperature: 0.7  # Temperature
    max_tokens: 500   # Maximum generated tokens
    top_p: 1
    frequency_penalty: 0  # Frequency penalty
  AliAppLLM:
    # Defines the LLM API type
    type: AliBL
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    app_id: your app_id
    # You can find your api_key here: https://bailian.console.aliyun.com/?apiKey=1#/api-key
    api_key: your api_key
    # Whether to skip the local prompt: true|false (by default, set the prompt in the Bailian app)
    is_no_prompt: true
    # Ali_memory_id: false (do not use) | your memory_id (get it from the Bailian app settings)
    # Tip! Ali_memory does not support multi-user memory storage (memory is keyed by id)
    ali_memory_id: false
  DoubaoLLM:
    # Defines the LLM API type
    type: openai
    # Activate the service first: open the URL below, search for Doubao-1.5-pro in the service list, and activate it
